services:
  db_test:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ledger_test
    ports:
      - '5433:5432'
    volumes:
      - ledger_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 3s
      timeout: 3s
      retries: 5

  redis_test:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 5

  srh_test:
    image: hiett/serverless-redis-http:latest
    ports:
      - '8079:80'
    environment:
      SRH_MODE: env
      SRH_TOKEN: test_token
      SRH_CONNECTION_STRING: 'redis://redis_test:6379'
    depends_on:
      redis_test:
        condition: service_healthy

volumes:
  ledger_test_data:
    driver: local