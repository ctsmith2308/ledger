name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '0 9 * * 1' # Weekly Monday 9am UTC

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high
