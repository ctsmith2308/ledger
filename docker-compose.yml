services:

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ledger-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ledger-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Core API (NestJS) ────────────────────────────────────────────────────────

  core-api:
    build:
      context: ./apps/ledger-api-core
      dockerfile: Dockerfile
    command: npm run start:dev
    volumes:
      - ./apps/ledger-api-core:/app        # bind your local src into the container
      - /app/node_modules   
    container_name: ledger-core-api
    ports:
      - '3001:3001'         # exposed for local debugging; not public in prod
    environment:
      PORT: 3001
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

